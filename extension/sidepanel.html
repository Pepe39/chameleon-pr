<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <div class="header-bar">
      <h1>Code Review Labeler <span id="extVersion" class="version-tag"></span></h1>
      <button id="resyncBtn" class="icon-btn" title="Rescrape task data" aria-label="Rescrape task data">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="task">Task</button>
      <button class="tab" data-tab="config">Config</button>
    </div>

    <!-- ========= TASK TAB ========= -->
    <div id="tab-task" class="tab-content active">
      <div class="page-status">
        <span id="pageStatusText">Checking page...</span>
        <span id="pageStatusDot" class="status-dot disconnected"></span>
      </div>

      <div id="taskInfo" class="task-info hidden">
        <div class="row"><span class="label">Task ID</span><span id="taskId" class="mono"></span></div>
      </div>

      <div id="scrapePreview" class="card hidden">
        <details open>
          <summary>Scraped Inputs</summary>
          <div id="threadBadge" class="thread-badge hidden"></div>
          <div id="inputsList"></div>
          <div id="missingWarn" class="warn hidden"></div>
        </details>
      </div>

      <button id="runBtn" class="btn primary hidden">Run /run pipeline</button>
      <button id="reviewBtn" class="btn primary hidden">Run /review</button>
      <button id="fillBtn" class="btn success hidden">Fill Deliverables</button>
      <button id="applyFixesBtn" class="btn success hidden">Apply Review Fixes</button>
      <button id="reevaluateBtn" class="btn hidden">Reevaluate Review</button>
      <button id="recheckBtn" class="btn hidden">Recheck</button>
      <button id="fixRecheckBtn" class="btn hidden">Fix Recheck</button>
      <button id="clearBtn" class="btn hidden">Clear Page Fields</button>
      <button id="statusBtn" class="btn hidden">Status</button>

      <div id="statusCard" class="card hidden">
        <details open>
          <summary>Task Status</summary>
          <div id="statusBody"></div>
        </details>
      </div>

      <div id="progress" class="progress hidden">
        <div class="spinner"></div>
        <span id="progressText">Running...</span>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="resultsCard" class="card hidden">
        <details open>
          <summary>Deliverables</summary>
          <div id="resultsList"></div>
        </details>
      </div>

      <div id="reviewCard" class="card hidden">
        <details open>
          <summary>Review Result</summary>
          <div id="reviewChanges"></div>
          <div id="reviewFeedback"></div>
        </details>
      </div>

      <div id="wrongPage" class="warn hidden">
        Navigate to <strong>annotation-platform-henna.vercel.app/tasks/&lt;id&gt;</strong> to start.
      </div>
    </div>

    <!-- ========= CONFIG TAB ========= -->
    <div id="tab-config" class="tab-content">
      <div class="row">
        <span class="label">API URL</span>
        <span id="apiStatusDot" class="status-dot disconnected"></span>
      </div>
      <div class="row">
        <input type="text" id="apiUrl" placeholder="http://localhost:5002" spellcheck="false">
        <button id="saveApiBtn" class="btn-small">Save</button>
      </div>

      <div class="row" style="margin-top:12px;">
        <span class="label">Model</span>
      </div>
      <div class="row">
        <select id="modelSelect">
          <option value="claude-opus-4-6">Opus 4.6</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        </select>
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
